<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/popup.css">
        <link rel="stylesheet" href="css/languages.css">
        <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
        <link rel="shortcut icon" href="/images/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
        <link rel="manifest" href="/images/site.webmanifest" />
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>План одвожења кабастог отпада на територији општине Суботица</title>
    </head>
    <body>
        <!-- LANGUAGE-POPUP -->
        <script src="js/languages.js"></script>
        <div class="flag-sidebar">
          <button class="toggle-btn" onclick="toggleMenu()">🌐</button>
          <div class="menu-content" id="flagMenu">
            <!-- latinica -->
            <a href="sr/" class="flag-item">
              <span class="country-text">Latinica</span>
              <img src="images/rs.svg" alt="SR">
            </a>
            <!-- madjarski -->
            <a href="hu/" class="flag-item">
              <span class="country-text">Magyar</span>
              <img src="images/hu.svg" alt="HU">
            </a>
            <!-- engleski -->
            <a href="en/" class="flag-item">
              <span class="country-text">English</span>
              <img src="images/uk.svg" alt="EN">
            </a>
          </div>
        </div>
        <div id="popup-wrapper">
            <div class="popup-title">Пролећна акција од 19.03. до 10.06.2026. године</div>
                <div id="popup">
                  <span class="popup-text">КЛИК за више детаља</span>
                  <div class="dot">
                    <!-- Hand is now nested in dot for easier alignment -->
                    <svg class="hand-icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5">
                      <path d="M 13,11 V 9 c 0,-1.1 0.9,-2 2,-2 1.1,0 2,0.9 2,2 v 2 m 0,0 v -1 c 0,-1.1 0.9,-2 2,-2 1.1,0 2,0.9 2,2 v 6 c 0,3.3 -2.7,6 -6,6 H 9.6453325 l -6.09375,-4.854324 c -0.7452203,-0.657604 1.7456732,-3.217157 2.1461893,-2.917846 1.4220836,1.062741 2.119277,1.726517 3.3021835,2.676399 L 9.0024888,10.72141 9,5 c -4.785e-4,-1.0999999 0.9,-2 2,-2 1.1,0 2,0.9 2,2 v 6" />
                    </svg>
                  </div>
                </div>
            </div>
        </div>
        <script>
          setTimeout(() => {
            window.addEventListener('click', () => {
              document.getElementById('popup-wrapper')?.classList.add('hidden');
            }, { once: true });
          }, 500); // half a second delay
        </script>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/subotica_teritorija_1.js"></script>
        <script src="data/kabasti_Gradske_MZ_2.js"></script>
        <script src="data/kabasti_Prigradske_MZ_3.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        })
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('Извор: <a href="https://www.cistoca-su.co.rs/" target="_blank">ЈКП „Чистоћа и зеленило“ Суботица</a> &copy; Мапа: <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> &middot; by cvekiboy');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            if (bounds_group.getLayers().length) {
                map.fitBounds(bounds_group.getBounds());
            }
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        function pop_subotica_teritorija_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(String(feature.properties['id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_subotica_teritorija_1_0() {
            return {
                pane: 'pane_subotica_teritorija_1',
                opacity: 1,
                color: 'rgba(228,26,28,1.0)',
                dashArray: '4.0,2.0',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 1.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_subotica_teritorija_1');
        map.getPane('pane_subotica_teritorija_1').style.zIndex = 401;
        map.getPane('pane_subotica_teritorija_1').style['mix-blend-mode'] = 'normal';
        var layer_subotica_teritorija_1 = new L.geoJson(json_subotica_teritorija_1, {
            attribution: '',
            interactive: false,
            dataVar: 'json_subotica_teritorija_1',
            layerName: 'layer_subotica_teritorija_1',
            pane: 'pane_subotica_teritorija_1',
            onEachFeature: pop_subotica_teritorija_1,
            style: style_subotica_teritorija_1_0,
        });
        bounds_group.addLayer(layer_subotica_teritorija_1);
        map.addLayer(layer_subotica_teritorija_1);
        function pop_kabasti_Gradske_MZ_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Месна заједница</th>\
                        <td class="visible-with-data" id="Месна заједница">' + (feature.properties['Месна заједница'] !== null ? autolinker.link(String(feature.properties['Месна заједница']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Позиција</th>\
                        <td class="visible-with-data" id="Позиција">' + (feature.properties['Позиција'] !== null ? autolinker.link(String(feature.properties['Позиција']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Датум од</th>\
                        <td class="visible-with-data" id="Датум од"><strong>' + (feature.properties['Датум од'] !== null ? autolinker.link(String(feature.properties['Датум од']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Датум до</th>\
                        <td class="visible-with-data" id="Датум до"><strong>' + (feature.properties['Датум до'] !== null ? autolinker.link(String(feature.properties['Датум до']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_kabasti_Gradske_MZ_2_0() {
            return {
                pane: 'pane_kabasti_Gradske_MZ_2',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(128,59,4,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_kabasti_Gradske_MZ_2');
        map.getPane('pane_kabasti_Gradske_MZ_2').style.zIndex = 402;
        map.getPane('pane_kabasti_Gradske_MZ_2').style['mix-blend-mode'] = 'normal';
        var layer_kabasti_Gradske_MZ_2 = new L.geoJson(json_kabasti_Gradske_MZ_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_kabasti_Gradske_MZ_2',
            layerName: 'layer_kabasti_Gradske_MZ_2',
            pane: 'pane_kabasti_Gradske_MZ_2',
            onEachFeature: pop_kabasti_Gradske_MZ_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_kabasti_Gradske_MZ_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_kabasti_Gradske_MZ_2);
        map.addLayer(layer_kabasti_Gradske_MZ_2);
        function pop_kabasti_Prigradske_MZ_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Месна заједница</th>\
                        <td class="visible-with-data" id="Месна заједница">' + (feature.properties['Месна заједница'] !== null ? autolinker.link(String(feature.properties['Месна заједница']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Позиција</th>\
                        <td class="visible-with-data" id="Позиција">' + (feature.properties['Позиција'] !== null ? autolinker.link(String(feature.properties['Позиција']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Датум од</th>\
                        <td class="visible-with-data" id="Датум од"><strong>' + (feature.properties['Датум од'] !== null ? autolinker.link(String(feature.properties['Датум од']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Датум до</th>\
                        <td class="visible-with-data" id="Датум до"><strong>' + (feature.properties['Датум до'] !== null ? autolinker.link(String(feature.properties['Датум до']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_kabasti_Prigradske_MZ_3_0() {
            return {
                pane: 'pane_kabasti_Prigradske_MZ_3',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(139,137,13,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_kabasti_Prigradske_MZ_3');
        map.getPane('pane_kabasti_Prigradske_MZ_3').style.zIndex = 403;
        map.getPane('pane_kabasti_Prigradske_MZ_3').style['mix-blend-mode'] = 'normal';
        var layer_kabasti_Prigradske_MZ_3 = new L.geoJson(json_kabasti_Prigradske_MZ_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_kabasti_Prigradske_MZ_3',
            layerName: 'layer_kabasti_Prigradske_MZ_3',
            pane: 'pane_kabasti_Prigradske_MZ_3',
            onEachFeature: pop_kabasti_Prigradske_MZ_3,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_kabasti_Prigradske_MZ_3_0(feature));
            },
        });
        bounds_group.addLayer(layer_kabasti_Prigradske_MZ_3);
        map.addLayer(layer_kabasti_Prigradske_MZ_3);
        setBounds();
        resetLabels([layer_kabasti_Gradske_MZ_2]);
        map.on("zoomend", function(){
            resetLabels([layer_kabasti_Gradske_MZ_2]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_kabasti_Gradske_MZ_2]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_kabasti_Gradske_MZ_2]);
        });
        </script>        
    </body>
</html>

    <body>

        <div id="popup">
          <span class="popup-text">CLICK for more details</span>
          <div class="dot">
            <!-- Hand is now nested in dot for easier alignment -->
            <svg class="hand-icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5">
              <path d="M9 10V5C9 3.9 9.9 3 11 3C12.1 3 13 3.9 13 5V11M9 10C9 11.1 8.1 12 7 12V9M13 11V9C13 7.9 13.9 7 15 7C16.1 7 17 7.9 17 9V11M17 11V10C17 8.9 17.9 8 19 8C20.1 8 21 8.9 21 10V16C21 19.3 18.3 22 15 22H11.6L4.7 16.4C4.3 16 4.3 15.3 4.7 15L9 17.8V11" />
            </svg>

        <script>
          window.addEventListener('click', () => {
            document.getElementById('popup')?.classList.add('hidden');
          }, { once: true });
        </script>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/subotica_teritorija_1.js"></script>
        <script src="data/kabasti_Gradske_MZ_lat_2.js"></script>
        <script src="data/kabasti_Prigradske_MZ_lat_3.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        })
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('Source: <a href="https://www.cistoca-su.co.rs/" target="_blank">JKP "Čistoća i zelenilo" Subotica"</a> &middot; by cvekiboy');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            if (bounds_group.getLayers().length) {
                map.fitBounds(bounds_group.getBounds());
            }
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        function pop_subotica_teritorija_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(String(feature.properties['id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_subotica_teritorija_1_0() {
            return {
                pane: 'pane_subotica_teritorija_1',
                opacity: 1,
                color: 'rgba(228,26,28,1.0)',
                dashArray: '4.0,2.0',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 1.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
        map.createPane('pane_subotica_teritorija_1');
        map.getPane('pane_subotica_teritorija_1').style.zIndex = 401;
        map.getPane('pane_subotica_teritorija_1').style['mix-blend-mode'] = 'normal';
        var layer_subotica_teritorija_1 = new L.geoJson(json_subotica_teritorija_1, {
            attribution: '',
            interactive: false,
            dataVar: 'json_subotica_teritorija_1',
            layerName: 'layer_subotica_teritorija_1',
            pane: 'pane_subotica_teritorija_1',
            onEachFeature: pop_subotica_teritorija_1,
            style: style_subotica_teritorija_1_0,
        });
        bounds_group.addLayer(layer_subotica_teritorija_1);
        map.addLayer(layer_subotica_teritorija_1);
        function pop_kabasti_Gradske_MZ_lat_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Mesna zajednica</th>\
                        <td class="visible-with-data" id="Mesna zajednica">' + (feature.properties['Mesna zajednica'] !== null ? autolinker.link(String(feature.properties['Mesna zajednica']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Pozicija</th>\
                        <td class="visible-with-data" id="Pozicija">' + (feature.properties['Pozicija'] !== null ? autolinker.link(String(feature.properties['Pozicija']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Datum od</th>\
                        <td class="visible-with-data" id="Datum od"><strong>' + (feature.properties['Datum od'] !== null ? autolinker.link(String(feature.properties['Datum od']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Datum do</th>\
                        <td class="visible-with-data" id="Datum do"><strong>' + (feature.properties['Datum do'] !== null ? autolinker.link(String(feature.properties['Datum do']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_kabasti_Gradske_MZ_lat_2_0() {
            return {
                pane: 'pane_kabasti_Gradske_MZ_lat_2',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(128,59,4,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_kabasti_Gradske_MZ_lat_2');
        map.getPane('pane_kabasti_Gradske_MZ_lat_2').style.zIndex = 402;
        map.getPane('pane_kabasti_Gradske_MZ_lat_2').style['mix-blend-mode'] = 'normal';
        var layer_kabasti_Gradske_MZ_lat_2 = new L.geoJson(json_kabasti_Gradske_MZ_lat_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_kabasti_Gradske_MZ_lat_2',
            layerName: 'layer_kabasti_Gradske_MZ_lat_2',
            pane: 'pane_kabasti_Gradske_MZ_lat_2',
            onEachFeature: pop_kabasti_Gradske_MZ_lat_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_kabasti_Gradske_MZ_lat_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_kabasti_Gradske_MZ_lat_2);
        map.addLayer(layer_kabasti_Gradske_MZ_lat_2);
        function pop_kabasti_Prigradske_MZ_lat_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Mesna zajednica</th>\
                        <td class="visible-with-data" id="Mesna zajednica">' + (feature.properties['Mesna zajednica'] !== null ? autolinker.link(String(feature.properties['Mesna zajednica']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Pozicija</th>\
                        <td class="visible-with-data" id="Pozicija">' + (feature.properties['Pozicija'] !== null ? autolinker.link(String(feature.properties['Pozicija']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Datum od</th>\
                        <td class="visible-with-data" id="Datum od"><strong>' + (feature.properties['Datum od'] !== null ? autolinker.link(String(feature.properties['Datum od']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Datum do</th>\
                        <td class="visible-with-data" id="Datum do"><strong>' + (feature.properties['Datum do'] !== null ? autolinker.link(String(feature.properties['Datum do']).replace(/'/g, '\'').toLocaleString()) : '') + '</strong></td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_kabasti_Prigradske_MZ_lat_3_0() {
            return {
                pane: 'pane_kabasti_Prigradske_MZ_lat_3',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(139,137,13,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_kabasti_Prigradske_MZ_lat_3');
        map.getPane('pane_kabasti_Prigradske_MZ_lat_3').style.zIndex = 403;
        map.getPane('pane_kabasti_Prigradske_MZ_lat_3').style['mix-blend-mode'] = 'normal';
        var layer_kabasti_Prigradske_MZ_lat_3 = new L.geoJson(json_kabasti_Prigradske_MZ_lat_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_kabasti_Prigradske_MZ_lat_3',
            layerName: 'layer_kabasti_Prigradske_MZ_lat_3',
            pane: 'pane_kabasti_Prigradske_MZ_lat_3',
            onEachFeature: pop_kabasti_Prigradske_MZ_lat_3,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_kabasti_Prigradske_MZ_lat_3_0(feature));
            },
        });
        bounds_group.addLayer(layer_kabasti_Prigradske_MZ_lat_3);
        map.addLayer(layer_kabasti_Prigradske_MZ_lat_3);
        setBounds();
        resetLabels([layer_kabasti_Gradske_MZ_lat_2]);
        map.on("zoomend", function(){
            resetLabels([layer_kabasti_Gradske_MZ_lat_2]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_kabasti_Gradske_MZ_lat_2]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_kabasti_Gradske_MZ_lat_2]);
        });
        </script>
